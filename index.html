<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Camera - USB & Bluetooth</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 10px; }
        canvas { display: none; }
        .status { margin: 10px 0; padding: 8px; border-radius: 5px; font-size: 13px; font-weight: bold; }
        .off { background: #fee; color: #c33; }
        .on { background: #efe; color: #282; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-usb { background: #555; color: white; }
        .btn-ble { background: #1a73e8; color: white; }
        .btn-print { background: #28a745; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; opacity: 0.6; }
    </style>
</head>
<body>

<div class="card">
    <h3>Allservice POS Hybrid</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="status" class="status off">Printer: Belum Terhubung</div>

    <div class="btn-group">
        <button class="btn-usb" onclick="konekUSB()">Konek USB</button>
        <button class="btn-ble" onclick="konekBluetooth()">Konek Bluetooth</button>
    </div>
    
    <button id="printBtn" class="btn-print" onclick="ambilDanCetak()" disabled>AMBIL FOTO & CETAK</button>
</div>

<script>
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let printerDevice = null;
    let mode = ""; // "usb" atau "ble"

    // 1. AKTIFKAN KAMERA
    async function initKamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    }
    initKamera();

    // 2. KONEKSI USB
    async function konekUSB() {
        try {
            printerDevice = await navigator.usb.requestDevice({ filters: [] }); // Ambil semua device USB
            await printerDevice.open();
            await printerDevice.selectConfiguration(1);
            await printerDevice.claimInterface(0); 
            
            mode = "usb";
            document.getElementById('status').innerText = "Terhubung: USB Printer";
            document.getElementById('status').className = "status on";
            document.getElementById('printBtn').disabled = false;
        } catch (err) {
            alert("USB Error: " + err);
        }
    }

    // 3. KONEKSI BLUETOOTH
    let bleChar;
    async function konekBluetooth() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            bleChar = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            
            mode = "ble";
            document.getElementById('status').innerText = "Terhubung: BLE " + device.name;
            document.getElementById('status').className = "status on";
            document.getElementById('printBtn').disabled = false;
        } catch (err) {
            alert("BLE Error: " + err);
        }
    }

    // 4. PROSES CETAK
    async function ambilDanCetak() {
        const ctx = canvas.getContext('2d');
        canvas.width = 384; 
        canvas.height = Math.floor((video.videoHeight / video.videoWidth) * 384);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imgData.data;
        let bitmap = new Uint8Array((canvas.width / 8) * canvas.height);

        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
                let i = (y * canvas.width + x) * 4;
                let brightness = (pixels[i] * 0.299 + pixels[i+1] * 0.587 + pixels[i+2] * 0.114);
                if (brightness < 128) {
                    let byteIdx = (y * 48) + (x >> 3);
                    bitmap[byteIdx] |= (0x80 >> (x % 8));
                }
            }
        }

        // Header ESC/POS (GS v 0)
        const header = new Uint8Array([0x1B, 0x40, 0x1D, 0x76, 0x30, 0, 48, 0, canvas.height & 0xff, (canvas.height >> 8) & 0xff]);
        const footer = new Uint8Array([0x1B, 0x64, 0x03]); // Feed 3 baris
        
        const combinedData = new Uint8Array(header.length + bitmap.length + footer.length);
        combinedData.set(header);
        combinedData.set(bitmap, header.length);
        combinedData.set(footer, header.length + bitmap.length);

        if (mode === "usb") {
            // KIRIM VIA USB (Sangat Cepat & Smooth)
            // Biasanya endpoint out adalah 1 atau 2
            try {
                await printerDevice.transferOut(1, combinedData); 
            } catch (e) {
                // Jika endpoint 1 gagal, coba endpoint 2 atau 3
                await printerDevice.transferOut(2, combinedData);
            }
        } else {
            // KIRIM VIA BLUETOOTH (Tetap pakai chunking)
            const CHUNK = 128;
            for (let i = 0; i < combinedData.length; i += CHUNK) {
                await bleChar.writeValue(combinedData.slice(i, i + CHUNK));
            }
        }
    }
</script>
</body>
</html>
