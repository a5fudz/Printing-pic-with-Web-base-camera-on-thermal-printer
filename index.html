<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allservice POS - Bluetooth Optimized</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; }
        .status { padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .off { background: #ffebee; color: #c62828; }
        .on { background: #e8f5e9; color: #2e7d32; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-connect { background: #1a73e8; color: white; }
        .btn-print { background: #34a853; color: white; }
        button:disabled { background: #ccc; }
        textarea { width: 100%; height: 120px; margin: 10px 0; box-sizing: border-box; font-family: monospace; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>Allservice POS</h2>
    <div id="status" class="status off">Printer: Terputus</div>
    
    <button id="connectBtn" class="btn-connect">1. Cari Printer Bluetooth</button>
    
    <textarea id="content">
ALLSERVICE POS
--------------------------------
Item 1          Rp 15.000
Item 2          Rp 10.000
--------------------------------
TOTAL           Rp 25.000
    </textarea>
    
    <button id="printBtn" class="btn-print" disabled>2. Cetak Struk</button>
</div>

<script>
    let printerChar;

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            printerChar = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

            document.getElementById('status').innerText = "Printer: " + device.name;
            document.getElementById('status').className = "status on";
            document.getElementById('printBtn').disabled = false;
        } catch (err) {
            alert("Gagal konek: " + err);
        }
    });

    document.getElementById('printBtn').addEventListener('click', async () => {
        if (!printerChar) return;

        const printBtn = document.getElementById('printBtn');
        printBtn.disabled = true; // Kunci tombol saat mencetak
        
        const encoder = new TextEncoder();
        // Gabungkan perintah Inisialisasi (ESC @) dengan teks
        const initCommand = new Uint8Array([0x1B, 0x40]);
        const textData = encoder.encode(document.getElementById('content').value + "\n\n\n\n");
        
        // Gabungkan semua data menjadi satu array buffer
        const fullData = new Uint8Array(initCommand.length + textData.length);
        fullData.set(initCommand);
        fullData.set(textData, initCommand.length);

        try {
            // Menaikkan CHUNK_SIZE agar printer tidak menunggu data terlalu sering
            // Kebanyakan printer modern bisa menangani 128-512 bytes
            const CHUNK_SIZE = 128; 
            
            for (let i = 0; i < fullData.length; i += CHUNK_SIZE) {
                const chunk = fullData.slice(i, i + CHUNK_SIZE);
                
                // Gunakan writeValueWithoutResponse jika didukung untuk kecepatan maksimal
                if (printerChar.writeValueWithoutResponse) {
                    await printerChar.writeValueWithoutResponse(chunk);
                } else {
                    await printerChar.writeValue(chunk);
                }
                
                // Beri jeda sangat kecil (10ms) agar buffer printer tidak meluap
                await new Promise(resolve => setTimeout(resolve, 10));
            }
        } catch (err) {
            alert("Gagal cetak: " + err);
        } finally {
            printBtn.disabled = false;
        }
    });
</script>
</body>
</html>
